# ===== DATABASE =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:pms_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JPA STARTUP BEHAVIOR =====
# Prevents Hibernate from connecting to DB during context initialization
# (dialect is already set above, so metadata fetch from DB is not needed)
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# ===== SERVER =====
# Railway injects PORT env var; fall back to 8080 locally
server.port=${PORT:8080}

# ===== ACTUATOR / HEALTHCHECK =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.db.enabled=false
